<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創意思考老虎機</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
    :root { 
        --gold: #ffd700; --bg: #0d0d0d; --red-main: #9e0000; --red-dark: #4a0000; 
        --metal: linear-gradient(145deg, #bdbdbd, #ffffff, #858585); 
    }

    body { 
        font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); 
        margin: 0; display: flex; justify-content: center; align-items: center; 
        min-height: 100vh; overflow: hidden; color: white; 
    }

    .container { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .hidden { display: none !important; }

    /* 等待介面 */
    #wait-view { text-align: center; background: rgba(20,20,20,0.9); padding: 40px; border-radius: 30px; border: 5px solid var(--gold); }
    #counter { font-size: 80px; font-weight: bold; color: #ff3131; margin: 10px; }
    .btn-go { background: linear-gradient(180deg, #3498db, #2980b9); color: white; border: none; padding: 15px 50px; border-radius: 60px; font-size: 24px; cursor: pointer; font-weight: bold; }

    /* 老虎機主體 */
    #slot-view { 
        display: flex; align-items: flex-end; justify-content: center; 
        width: 85vw; height: 85vh; max-width: 95%; margin: auto;
    }

    .slot-machine { 
        background: var(--red-main); flex: 1; height: 100%; border-radius: 40px; border: 12px solid var(--red-dark); 
        box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.6);
        display: flex; flex-direction: column; align-items: center; padding: 30px; box-sizing: border-box; flex-shrink: 0; 
    }

    .machine-title { 
        font-size: clamp(3rem, 8vw, 5rem); margin: 20px 0 40px 0; 
        color: #fff; font-weight: 900; letter-spacing: 5px;
        text-shadow: 3px 3px 10px rgba(0,0,0,0.8); 
    }

    .slots-viewport { 
        width: 95%; height: 50%; background: #111; border-radius: 20px; 
        border: 8px solid #222; outline: 5px solid var(--gold); 
        display: flex; overflow: hidden;
    }

    .slot-column { 
        width: 33.33%; display: flex; align-items: center; justify-content: center; 
        border-right: 2px solid rgba(0,0,0,0.3);
        background: linear-gradient(180deg, #e0e0e0 0%, #fff 40%, #fff 60%, #e0e0e0 100%);
    }

    .slot-item { 
        font-size: 70px; font-weight: 900; color: #222; text-align: center; 
        width: 90%; line-height: 1.2;
    }

    .footer-text { font-size: 20px; color: rgba(255,255,255,0.6); margin-top: 30px; letter-spacing: 5px; }

    /* 拉桿樣式 - 最穩定的原始版本 */
    .handle-wrapper { width: 80px; height: 70vh; position: relative; cursor: pointer; margin-left: 20px; }
    .handle-base { position: absolute; bottom: 0; width: 80px; height: 100px; background: #333; border-radius: 5px; clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%); }
    
    .handle-stick { 
        position: absolute; bottom: 40px; left: 30px; width: 20px; height: 50vh; 
        background: var(--metal); border-radius: 10px;
        transform-origin: bottom center;
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .handle-ball { 
        position: absolute; top: -40px; left: -20px; width: 60px; height: 60px; 
        background: radial-gradient(circle at 30% 30%, #ff5555, #990000); 
        border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    /* 按下後的旋轉狀態 */
    .handle-wrapper.active .handle-stick { transform: rotateX(50deg) scaleY(0.8); }

    .blur-animate { filter: blur(4px); opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <!-- 等待介面 -->
    <div id="wait-view">
        <h1>創意碎片期待值</h1>
        <div id="counter">0</div>
        <div id="qrcode" style="display:flex; justify-content:center; margin:20px;"></div>
        <button class="btn-go" onclick="showSlotMachine()">GO!</button>
    </div>

    <!-- 老虎機主界面 -->
    <div id="slot-view" class="hidden">
        <div class="slot-machine">
            <h2 class="machine-title">CREATIVE SLOT</h2>
            <div class="slots-viewport">
                <div class="slot-column"><div id="s1" class="slot-item">？</div></div>
                <div class="slot-column"><div id="s2" class="slot-item">？</div></div>
                <div class="slot-column"><div id="s3" class="slot-item">？</div></div>
            </div>
            <div class="footer-text">‧亞洲大學創意設計‧</div>
        </div>

        <!-- 拉桿：按住轉，放開停 -->
        <div id="handle" class="handle-wrapper" 
             onmousedown="handlePress()" 
             onmouseup="handleRelease()" 
             onmouseleave="handleRelease()"
             ontouchstart="handlePress()"
             ontouchend="handleRelease()">
            <div class="handle-base"></div>
            <div class="handle-stick">
                <div class="handle-ball"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFXIj9VPb2ABXVQttXykbx8yRbD856pptbqJ1iptBhGbThq7wbw68VHj8c7vJVb28/exec";
    let allData = { who: [], where: [], doing: [] };
    let spinTimer = null;
    let isSpinning = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // 按下滑鼠：啟動
    function handlePress() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById('handle').classList.add('active');
        
        const items = document.querySelectorAll('.slot-item');
        items.forEach(el => el.classList.add('blur-animate'));

        spinTimer = setInterval(() => {
            playTick();
            items.forEach((el, i) => {
                const cat = ['who', 'where', 'doing'][i];
                if (allData[cat].length > 0) {
                    el.innerText = allData[cat][Math.floor(Math.random() * allData[cat].length)];
                }
            });
        }, 80);
    }

    // 放開滑鼠：定格
    function handleRelease() {
        if (!isSpinning) return;
        isSpinning = false;
        document.getElementById('handle').classList.remove('active');
        clearInterval(spinTimer);

        document.querySelectorAll('.slot-item').forEach((el, i) => {
            el.classList.remove('blur-animate');
            const cat = ['who', 'where', 'doing'][i];
            if (allData[cat].length > 0) {
                el.innerText = allData[cat][Math.floor(Math.random() * allData[cat].length)];
            }
        });
        setTimeout(adjustFontSize, 50);
    }

    function adjustFontSize() {
        const items = document.querySelectorAll('.slot-item');
        items.forEach(el => {
            let size = 70;
            el.style.fontSize = size + 'px';
            while ((el.scrollHeight > el.parentElement.offsetHeight || el.scrollWidth > el.parentElement.offsetWidth) && size > 20) {
                size -= 2;
                el.style.fontSize = size + 'px';
            }
        });
    }

    function showSlotMachine() {
        if (allData.who.length === 0) return alert("資料載入中...");
        document.getElementById('wait-view').classList.add('hidden');
        document.getElementById('slot-view').classList.remove('hidden');
        adjustFontSize();
    }

    new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 130, height: 130 });

    function fetchData() {
        fetch(GAS_URL + "?action=get").then(res => res.json()).then(data => {
            allData = data;
            document.getElementById('counter').innerText = data.who.length;
        });
    }

    setInterval(fetchData, 3000);
    fetchData();
</script>

</body>
</html>
