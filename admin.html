<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創意思考老虎機 (完美適配版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
    /* 基礎顏色與變數 */
    :root { 
        --gold: #ffd700; --bg: #0d0d0d; --red-main: #9e0000; --red-dark: #4a0000; 
        --metal: linear-gradient(145deg, #bdbdbd, #ffffff, #858585); 
    }

    body { 
        font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); 
        margin: 0; display: flex; justify-content: center; align-items: center; 
        min-height: 100vh; overflow: hidden; color: white; 
    }

    .container { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .hidden { display: none !important; }

    /* 等待介面樣式（維持現狀，已優化過） */
    #wait-view { 
        text-align: center; background: rgba(20,20,20,0.95); 
        padding: 2vh 5vw; border-radius: 30px; border: 5px solid var(--gold); 
        max-width: 90vw; max-height: 95vh; display: flex; flex-direction: column; 
        justify-content: center; align-items: center; box-sizing: border-box;
    }
    #wait-view h1 { font-size: clamp(24px, 4vh, 48px) !important; margin: 10px 0; }
    #counter { font-size: clamp(60px, 12vh, 120px); font-weight: bold; color: #ff3131; margin: 5px; }
    #qrcode img, #qrcode canvas { width: 45vh !important; height: 45vh !important; border: 15px solid white; border-radius: 10px; margin: 10px auto; }
    .btn-go { background: linear-gradient(180deg, #3498db, #2980b9); color: white; border: none; padding: 15px 60px; border-radius: 50px; font-size: clamp(20px, 3vh, 32px); cursor: pointer; font-weight: bold; margin-top: 10px; }

    /* 1. 老虎機主體：改用 vh 確保高度不穿幫 */
    #slot-view { 
        display: flex; align-items: center; justify-content: center; 
        width: 89vw; height: 90vh; max-height: 90vh; margin: auto;
    }

    .slot-machine { 
        background: var(--red-main); flex: 1; height: 100%; max-height: 85vh; border-radius: 40px; border: 12px solid var(--red-dark); 
        box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.6);
        display: flex; flex-direction: column; align-items: center; padding: 2vh; box-sizing: border-box; position: relative;
        z-index: 10;
    }

.machine-title { 
        /* 💡 放大字體：從 8vh 提高到 10vh，最大到 7.5rem */
        font-size: clamp(3rem, 10vh, 7.5rem); 
        /* 💡 縮減邊距，把空間讓給大字 */
        margin: 3.5vh 0 0 0; 
        color: #fff; text-transform: uppercase; font-weight: 900; letter-spacing: 5px;
        text-shadow: 5px 5px 15px rgba(0, 0, 0, 0.8), 2px 2px 0px rgba(0, 0, 0, 0.9); 
        flex-shrink: 0;
    }

    .footer-text {
        font-size: clamp(14px, 2.5vh, 24px); /* 防跑版：字體隨高度縮放 */
        font-weight: bold; color: rgba(252, 252, 252, 0.7); 
        margin-top: auto; padding-bottom: 1vh; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); letter-spacing: 8px; flex-shrink: 0;
    }

.slots-viewport { 
        width: 95%; 
        height: 55%; 
        background: #111; border-radius: 20px; 
        border: 8px solid #222; outline: 5px solid var(--gold); 
        display: flex; overflow: hidden;
        
        /* 💡 新增這行：自動水平置中，並利用 margin-top 把它往下壓 */
        /* 5vh 代表離標題遠一點，您可以根據視覺調整這個數字 */
        margin: 6vh auto 0 auto; 
    }

    .slot-column { width: 33.33%; display: flex; align-items: center; justify-content: center; border-right: 3px solid rgba(0,0,0,0.5); background: linear-gradient(180deg, #dcdcdc 0%, #fff 35%, #fff 65%, #dcdcdc 100%); }
    .slot-column:last-child { border-right: none; }
    .slot-item { font-size: 80px; font-weight: 900; color: #222; text-align: center; width: 95%; word-break: break-all; transition: font-size 0.2s; white-space: normal; line-height: 1.2; display: flex; align-items: center; justify-content: center; height: 100%; }

    /* --- 重寫拉桿區：解決穿幫問題 --- */
    .handle-wrapper { 
        width: 8vh; height: 70vh; /* 寬度也隨高度縮放，比例更一致 */
        z-index: 1;
        position: relative; cursor: pointer; margin-left: 20px; 
        /* 💡 新增這行：讓整個拉桿容器稍微往下偏移，對準機台底部 */
        /* 如果還是不夠低，可以把 5vh 改成 7vh */
        margin-top: 15vh;
    }
    
.handle-base { 
        position: absolute; 
        /* 💡 嘗試將 bottom 設為更小的值，甚至是負值 */
        /* 如果剛才 wrapper 已經下移，這裡設為 0 應該就會貼齊 */
        bottom: 0vh; 
        
        width: 100%; height: 10vh; left: 0; 
        background: linear-gradient(145deg, #555, #222); 
        clip-path: polygon(15% 0, 85% 0, 100% 100%, 0 100%); z-index: 2; 
    }

.handle-stick { 
        position: absolute; bottom: 5vh; left: 50%; 
        /* 💡 寬度從 1.5vh 增加到 2.5vh (變粗) */
        width: 2.5vh; 
        /* 💡 高度從 50vh 縮短到 40vh (變短) */
        height: 40vh; 
        /* 💡 負的 margin-left 必須是寬度的一半，用來水平置中 */
        margin-left: -1.25vh; 
        background: var(--metal); border-radius: 10px; 
        transform-origin: bottom center; transition: all 0.2s ease-out; z-index: 5;
    }

    .handle-ball { 
        position: absolute; 
        /* 💡 新的起始位置 (支點 5vh + 新桿長 40vh)，先維持原本對齊 */
        bottom: 44vh; left: 50%; 
        /* 💡 球也稍微放大，從 6vh 變成 8vh，跟桿子變粗比例才對 */
        width: 8vh; 
        height: 8vh; 
        /* 💡 負的 margin-left 必須是寬度的一半 */
        margin-left: -4vh; 
        background: radial-gradient(circle at 35% 35%, #ff8e8e, #ff0000, #660000); 
        border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        z-index: 15; transition: all 0.2s ease-out; pointer-events: none;
    }

/* 💡 按下動作同步修改 (對應新的桿長 40vh) */
    .handle-wrapper.active .handle-stick { 
        /* 💡 按下時桿子縮短到 15vh (原本是 20) */
        height: 15vh; 
        transform: scaleY(1.1); 
    }

    .handle-wrapper.active .handle-ball { 
        /* 💡 球跟著桿頂降到 (支點 5vh + 按下桿長 15vh) = 20vh */
        bottom: 20vh; 
        transform: scale(1.1); /* 稍微縮小 scale，避免放大太多 */
    }
    
    .blur-animate { animation: scrollBlur 0.1s infinite linear; filter: blur(6px); opacity: 0.6; }
    @keyframes scrollBlur { 0% { transform: translateY(-30px); } 100% { transform: translateY(30px); } }
</style>
</head>
<body>
<div class="container">
    <div id="wait-view">
        <h1 style="margin-top:0;">目前上傳件數</h1>
        <div id="counter">0</div>
        <div id="qrcode" style="display:flex; justify-content:center; margin:15px;"></div>
        <button class="btn-go" onclick="showSlotMachine()">解鎖並啟動 (GO!)</button>
    </div>
    
    <div id="slot-view" class="hidden">
        <div class="slot-machine">
            <h2 class="machine-title">CREATIVE SLOT</h2>
            <div class="slots-viewport">
                <div class="slot-column"><div id="s1" class="slot-item">？</div></div>
                <div class="slot-column"><div id="s2" class="slot-item">？</div></div>
                <div class="slot-column"><div id="s3" class="slot-item">？</div></div>
            </div>
            <div class="footer-text">‧亞洲大學創意設計‧</div>
        </div>

        <!-- 修正後的單一拉桿區塊 -->
        <div id="handle" class="handle-wrapper" 
             onmousedown="startSpinHandle()" onmouseup="stopSpinHandle()" onmouseleave="stopSpinHandle()"
             ontouchstart="startSpinHandle()" ontouchend="stopSpinHandle()">
            <div class="handle-base"></div>
            <div class="handle-stick"></div>
            <div class="handle-ball"></div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFXIj9VPb2ABXVQttXykbx8yRbD856pptbqJ1iptBhGbThq7wbw68VHj8c7vJVb28/exec";
    let allData = { who: [], where: [], doing: [] }, usedIndices = { who: [], where: [], doing: [] };
    let spinInterval = null, spinTimer = null;
    let isDragging = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    

    function showSlotMachine() {
        if (allData.who.length === 0) return alert("還沒有資料喔！");
        audioCtx.resume();
        document.getElementById('wait-view').classList.add('hidden');
        document.getElementById('slot-view').classList.remove('hidden');
        
    }

    function startSpinHandle() {
        isDragging = true; // 標記：開始拉動
        document.getElementById('handle').classList.add('active');
        const items = document.querySelectorAll('.slot-item');
        items.forEach(el => { el.classList.add('blur-animate'); });
        if (!spinInterval) spinInterval = setInterval(playTick, 100);
        if (!spinTimer) {
            spinTimer = setInterval(() => {
                items.forEach((el, i) => {
                    const cat = ['who', 'where', 'doing'][i];
                    if (allData[cat].length > 0) el.innerText = allData[cat][Math.floor(Math.random() * allData[cat].length)];
                });
            }, 60);
        }
    }

    function stopSpinHandle() {
    // 如果現在根本沒在拉（例如只是滑鼠飄過），就直接結束，不執行後面的亂數邏輯
    if (!isDragging) return; 

    isDragging = false; // 重置標記：已經放開或離開了
    
    document.getElementById('handle').classList.remove('active');
    const items = document.querySelectorAll('.slot-item');
    items.forEach(el => el.classList.remove('blur-animate'));
    clearInterval(spinInterval); spinInterval = null;
    clearInterval(spinTimer); spinTimer = null;
    
    if (allData.who.length > 0) {
        ['who','where','doing'].forEach((cat, i) => {
            if (!usedIndices[cat] || usedIndices[cat].length >= allData[cat].length) usedIndices[cat] = [];
            let avail = allData[cat].map((_, idx) => idx).filter(idx => !usedIndices[cat].includes(idx));
            let chosen = avail[Math.floor(Math.random() * avail.length)];
            usedIndices[cat].push(chosen);
            document.getElementById('s' + (i+1)).innerText = allData[cat][chosen];
        });
        
    }
}

    // 將 width 和 height 改為 400，產生的 QR Code 會更細緻，掃描率更高
    new QRCode(document.getElementById("qrcode"), { 
        text: window.location.href.replace('admin.html', 'index.html'), 
        width: 500, 
        height: 500 
    });
    function fetchData() { fetch(GAS_URL + "?action=get").then(res => res.json()).then(data => { allData = data; document.getElementById('counter').innerText = data.who.length; }); }
    setInterval(fetchData, 3000); fetchData();
</script>
</body>
</html>
