<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFXIj9VPb2ABXVQttXykbx8yRbD856pptbqJ1iptBhGbThq7wbw68VHj8c7vJVb28/exec";
    
    let allData = { who: [], where: [], doing: [] };
    let isAudioUnlocked = false; 

    // 初始化：產生 QR Code
    new QRCode(document.getElementById("qrcode"), {
        text: window.location.href.replace('admin.html', 'index.html'),
        width: 220, height: 220,
        correctLevel : QRCode.CorrectLevel.H 
    });

    // 每 3 秒抓一次人數
    const fetchInterval = setInterval(fetchData, 3000);
    fetchData(); 

    function fetchData() {
        fetch(GAS_URL + "?action=get").then(res => res.json()).then(data => {
            allData = data;
            document.getElementById('counter').innerText = data.who.length;
        }).catch(err => console.error("抓取資料失敗:", err));
    }

    function showSlotMachine() {
        if (allData.who.length === 0) return alert("還沒有人投稿喔！無法啟動老虎機。");
        
        // 嘗試解鎖音效，但不管成功與否，都要進入下一頁
        const spinSnd = document.getElementById('snd-spin');
        spinSnd.play().then(() => {
            spinSnd.pause();
            isAudioUnlocked = true;
        }).catch(err => {
            console.warn("音效解鎖失敗，將以靜音模式運行");
            isAudioUnlocked = false; // 即使失敗也不要擋住流程
        });

        document.getElementById('wait-view').classList.add('hidden');
        document.getElementById('slot-view').classList.remove('hidden');
    }

    const handleEl = document.getElementById('handle');
    const viewportEl = document.getElementById('viewport');
    const sndSpin = document.getElementById('snd-spin');
    const sndStop = document.getElementById('snd-stop');

    function startSpinHandle() {
        // 🚀 關鍵修正：刪除原本的 if (!isAudioUnlocked) return; 
        // 讓拉桿一定可以按！

        handleEl.classList.add('active');
        viewportEl.classList.add('active-neon');
        
        document.getElementById('s1').classList.add('blur-animate');
        document.getElementById('s2').classList.add('blur-animate');
        document.getElementById('s3').classList.add('blur-animate');
        
        // 只有在權限允許時才播音效，失敗就靜音轉動
        if (isAudioUnlocked) {
            sndSpin.currentTime = 0;
            sndSpin.play().catch(()=>{});
        }
    }

    function stopSpinHandle() {
        handleEl.classList.remove('active');
        viewportEl.classList.remove('active-neon');

        document.querySelectorAll('.slot-column div').forEach(el => el.classList.remove('blur-animate'));
        
        if (isAudioUnlocked) {
            sndSpin.pause();
            sndStop.currentTime = 0;
            sndStop.play().catch(()=>{});
        }

        // 隨機選取結果
        if (allData.who.length > 0) {
            document.getElementById('s1').innerText = allData.who[Math.floor(Math.random()*allData.who.length)];
            document.getElementById('s2').innerText = allData.where[Math.floor(Math.random()*allData.where.length)];
            document.getElementById('s3').innerText = allData.doing[Math.floor(Math.random()*allData.doing.length)];
        }
    }

    function clearGoogleSheets() {
        const password = prompt("請輸入管理密碼以清空試算表資料:");
        if (password !== "1234") return;
        if(!confirm("確定要清空嗎？")) return;

        fetch(GAS_URL + "?action=clear").then(res => res.text()).then(txt => {
            if (txt === "Success") {
                alert("已清空！");
                fetchData();
            }
        });
    }
</script>
