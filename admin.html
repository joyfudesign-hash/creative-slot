<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創意思考老虎機 (完美自適應版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* CSS 變數 */
        :root { 
            --gold: #ffd700; 
            --bg: #0d0d0d; 
            --red-main: #9e0000; 
            --red-dark: #4a0000;
            --metal: linear-gradient(145deg, #bdbdbd, #ffffff, #858585);
        }

        body { 
            font-family: "Microsoft JhengHei", "Arial Black", sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            color: white; 
        }

        /* 縮放容器：關鍵！鎖定 800x600 的核心比例，由此進行縮放 */
        #scaling-container {
            width: 800px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center; /* 從中心縮放 */
            transition: transform 0.1s ease-out;
        }

        .hidden { display: none !important; }

        /* --- 預備畫面 (不變) --- */
        #wait-view { 
            text-align: center; 
            background: rgba(20,20,20,0.9); 
            padding: 40px; 
            border-radius: 30px; 
            border: 5px solid var(--gold); 
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
        }
        #counter { font-size: 80px; font-weight: bold; color: #ff3131; margin: 10px; }
        .btn-go { background: linear-gradient(180deg, #3498db, #2980b9); color: white; border: none; padding: 15px 50px; border-radius: 60px; font-size: 24px; cursor: pointer; font-weight: bold; }

        /* --- 老虎機本體 (結構對照 image_5.png) --- */
        #slot-view { 
            display: flex; 
            align-items: flex-end; /* 拉桿與機身底部對齊 */
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .slot-machine { 
            background: var(--red-main); 
            width: 580px; /* 核心寬度 */
            height: 520px; /* 核心高度 */
            border-radius: 40px; 
            border: 12px solid var(--red-dark); 
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.8),
                inset 0 0 30px rgba(0,0,0,0.6);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 20px 40px 20px; 
            box-sizing: border-box; 
            flex-shrink: 0; /* 防止被壓縮 */
        }

        /* 狂野立體標題 (固定大小) */
        .machine-title { 
            font-size: 42px; 
            margin: 10px 0 20px 0; 
            color: #fff; 
            text-transform: uppercase;
            font-style: italic;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 
                0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9, 
                0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1),
                0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2),
                0 5px 10px rgba(0,0,0,.25), 0 0 25px #ff3131;
            flex-shrink: 0;
        }

        /* 捲軸區 (深陷感 + image_3.png 的漸層) */
        .slots-viewport { 
            width: 500px; 
            height: 300px; 
            background: #111; 
            border-radius: 20px; 
            border: 8px solid #222; 
            outline: 5px solid var(--gold); 
            box-shadow: 
                inset 0 35px 35px rgba(0,0,0,0.8), 
                inset 0 -35px 35px rgba(0,0,0,0.8);
            display: flex; 
            overflow: hidden; 
            flex-shrink: 0;
        }

        .slot-column { 
            width: 33.33%; 
            display: flex; align-items: center; justify-content: center; 
            border-right: 2px solid rgba(0,0,0,0.2); 
            /* 採用您調教的灰色漸層 */
            background: linear-gradient(180deg, rgba(220,220,220,1) 0%, rgba(255,255,255,1) 35%, rgba(255,255,255,1) 65%, rgba(220,220,220,1) 100%);
        }
        .slot-column:last-child { border-right: none; }

        .slot-item { font-size: 55px; font-weight: 900; color: #222; text-align: center; width: 90%; word-break: break-all; transition: 0.1s; }

        /* --- 擬真拉桿與底座 --- */
        .handle-wrapper { 
            width: 70px; 
            height: 480px; 
            position: relative; 
            cursor: pointer; 
            margin-left: 20px; 
            flex-shrink: 0; 
        }

        /* 立體底座 */
        .handle-base { 
            position: absolute; 
            bottom: 0; 
            width: 80px; 
            height: 100px; 
            left: -5px;
            background: linear-gradient(145deg, #555, #222);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%); /* 梯形 */
            border-radius: 5px;
            box-shadow: inset 1px 1px 3px rgba(255,255,255,0.2);
        }

        .handle-stick { 
            position: absolute; 
            bottom: 50px; 
            left: 24px; 
            width: 20px; 
            height: 380px; 
            background: var(--metal);
            transform-origin: bottom center; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
            box-shadow: 3px 0 5px rgba(0,0,0,0.3);
        }

        /* 擬真紅球 */
        .handle-ball { 
            position: absolute; 
            top: -45px; 
            left: -17px; 
            width: 55px; 
            height: 55px; 
            background: radial-gradient(circle at 35% 35%, #ff8e8e 0%, #ff0000 30%, #660000 100%);
            border-radius: 50%; 
            box-shadow: 2px 5px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s, top 0.2s;
        }

        /* 拉桿啟動狀態：純 2D 位移模擬，解決忽大忽小問題 */
        .handle-wrapper.active .handle-stick { 
            transform: translateY(180px); /* 直接向下位移，不旋轉 */
            height: 200px; /* 縮短槓身模擬下壓 */
        }
        .handle-wrapper.active .handle-ball { 
            transform: scale(0.9); /* 稍微縮小 */
            top: -35px; /* 位置微調 */
            filter: brightness(0.7); /* 變暗 */
        }

        /* 模糊動畫 */
        .blur-animate { animation: scrollBlur 0.1s infinite linear; filter: blur(6px); opacity: 0.6; }
        @keyframes scrollBlur { 0% { transform: translateY(-30px); } 100% { transform: translateY(30px); } }
    </style>
</head>
<body onload="initScale()" onresize="initScale()">

<div id="scaling-container">
    <div class="container">
        
        <div id="wait-view">
            <h1 style="margin-top:0;">創意碎片期待值</h1>
            <div id="counter">0</div>
            <div id="qrcode" style="display:flex; justify-content:center; margin:15px;"></div>
            <button class="btn-go" onclick="showSlotMachine()">解鎖並啟動 (GO!)</button>
        </div>

        <div id="slot-view" class="hidden">
            <div class="slot-machine">
                <h2 class="machine-title">CREATIVE SLOT</h2>
                <div class="slots-viewport">
                    <div class="slot-column"><div id="s1" class="slot-item">？</div></div>
                    <div class="slot-column"><div id="s2" class="slot-item">？</div></div>
                    <div class="slot-column"><div id="s3" class="slot-item">？</div></div>
                </div>
            </div>
            
            <div class="handle-wrapper" id="handle" onmousedown="startSpinHandle()" onmouseup="stopSpinHandle()" ontouchstart="startSpinHandle()" ontouchend="stopSpinHandle()">
                <div class="handle-base"></div>
                <div class="handle-stick"><div class="handle-ball"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 關鍵：自動比例縮放邏輯 ---
    function initScale() {
        const container = document.getElementById('scaling-container');
        const designWidth = 800;
        const designHeight = 600;
        
        const winWidth = window.innerWidth;
        const winHeight = window.innerHeight;
        
        // 計算寬高比，取較小者作為縮放倍數，確保不超出螢幕
        const scaleX = winWidth / designWidth;
        const scaleY = winHeight / designHeight;
        const scale = Math.min(scaleX, scaleY);
        
        // 套用縮放，並保持居中
        container.style.transform = `scale(${scale})`;
    }

    // --- 您的 JavaScript 功能邏輯 (完全無動) ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFXIj9VPb2ABXVQttXykbx8yRbD856pptbqJ1iptBhGbThq7wbw68VHj8c7vJVb28/exec";
    let allData = { who: [], where: [], doing: [] }, usedIndices = { who: [], where: [], doing: [] };
    let spinInterval = null, spinTimer = null;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function showSlotMachine() {
        if (allData.who.length === 0) return alert("還沒有資料喔！");
        audioCtx.resume();
        document.getElementById('wait-view').classList.add('hidden');
        document.getElementById('slot-view').classList.remove('hidden');
    }

    function startSpinHandle() {
        document.getElementById('handle').classList.add('active');
        const items = document.querySelectorAll('.slot-item');
        items.forEach(el => el.classList.add('blur-animate'));
        if (!spinInterval) spinInterval = setInterval(playTick, 100);
        if (!spinTimer) {
            spinTimer = setInterval(() => {
                items.forEach((el, i) => {
                    const cat = ['who', 'where', 'doing'][i];
                    if (allData[cat].length > 0) el.innerText = allData[cat][Math.floor(Math.random() * allData[cat].length)];
                });
            }, 60);
        }
    }

    function stopSpinHandle() {
        document.getElementById('handle').classList.remove('active');
        document.querySelectorAll('.slot-item').forEach(el => el.classList.remove('blur-animate'));
        clearInterval(spinInterval); spinInterval = null;
        clearInterval(spinTimer); spinTimer = null;
        if (allData.who.length > 0) {
            ['who','where','doing'].forEach((cat, i) => {
                if (!usedIndices[cat] || usedIndices[cat].length >= allData[cat].length) usedIndices[cat] = [];
                let avail = allData[cat].map((_, idx) => idx).filter(idx => !usedIndices[cat].includes(idx));
                let chosen = avail[Math.floor(Math.random() * avail.length)];
                usedIndices[cat].push(chosen);
                document.getElementById('s' + (i+1)).innerText = allData[cat][chosen];
            });
        }
    }

    new QRCode(document.getElementById("qrcode"), { text: window.location.href.replace('admin.html', 'index.html'), width: 130, height: 130 });
    function fetchData() { fetch(GAS_URL + "?action=get").then(res => res.json()).then(data => { allData = data; document.getElementById('counter').innerText = data.who.length; }); }
    setInterval(fetchData, 3000); fetchData();
</script>
</body>
</html>
