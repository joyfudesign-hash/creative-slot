<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創意思考老虎機 (專業安靜版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
       :root { 
        --gold: #ffd700; --bg: #0d0d0d; --red-main: #9e0000; --red-dark: #4a0000;
        --metal: linear-gradient(145deg, #bdbdbd, #ffffff, #858585);
    }
    body { 
        font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); 
        margin: 0; display: flex; justify-content: center; align-items: center; 
        min-height: 100vh; overflow: hidden; color: white; 
    }
    /* 核心縮放容器：解決比例與忽大忽小問題 */
    #scaling-container {
        width: 800px; height: 600px; display: flex; justify-content: center; align-items: center;
        transform-origin: center center; transition: transform 0.1s ease-out;
    }
    .hidden { display: none !important; }
    #slot-view { display: flex; align-items: flex-end; justify-content: center; width: 100%; height: 100%; }
    .slot-machine { 
        background: var(--red-main); width: 580px; height: 520px; border-radius: 40px; 
        border: 12px solid var(--red-dark); box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.6);
        display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; 
    }
    .machine-title { 
        font-size: 42px; margin: 10px 0 20px 0; color: #fff; font-style: italic; font-weight: 900;
        text-shadow: 0 5px 0 #aaa, 0 0 25px #ff3131;
    }
    .slots-viewport { 
        width: 500px; height: 300px; background: #111; border-radius: 20px; border: 8px solid #222; 
        outline: 5px solid var(--gold); box-shadow: inset 0 35px 35px rgba(0,0,0,0.8), inset 0 -35px 35px rgba(0,0,0,0.8);
        display: flex; overflow: hidden;
    }
    .slot-column { 
        width: 33.33%; display: flex; align-items: center; justify-content: center; border-right: 2px solid rgba(0,0,0,0.2); 
        background: linear-gradient(180deg, #dcdcdc 0%, #fff 35%, #fff 65%, #dcdcdc 100%);
    }
    .slot-item { font-size: 55px; font-weight: 900; color: #222; text-align: center; }
    .handle-wrapper { width: 70px; height: 480px; position: relative; cursor: pointer; margin-left: 20px; }
    .handle-base { 
        position: absolute; bottom: 0; width: 80px; height: 100px; background: linear-gradient(145deg, #555, #222);
        clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
    }
    .handle-stick { 
        position: absolute; bottom: 50px; left: 24px; width: 20px; height: 380px; background: var(--metal);
        transform-origin: bottom center; transition: 0.2s; border-radius: 10px;
    }
    .handle-ball { 
        position: absolute; top: -45px; left: -17px; width: 55px; height: 55px; 
        background: radial-gradient(circle at 35% 35%, #ff8e8e 0%, #ff0000 30%, #660000 100%);
        border-radius: 50%; box-shadow: 2px 5px 10px rgba(0,0,0,0.5);
    }
    /* 關鍵：改用位移，不影響機台寬度 */
    .handle-wrapper.active .handle-stick { transform: translateY(180px); height: 200px; }
    .handle-wrapper.active .handle-ball { transform: scale(0.9); filter: brightness(0.7); }
    .blur-animate { animation: scrollBlur 0.1s infinite linear; filter: blur(6px); }
    @keyframes scrollBlur { 0% { transform: translateY(-30px); } 100% { transform: translateY(30px); } }
    </style>
</head>
<body>
<body onload="initScale()" onresize="initScale()">
<div id="scaling-container">
    <div style="display:flex; flex-direction:column; align-items:center;">
        <div id="wait-view">
            <h1 style="margin-top:0;">創意碎片期待值</h1>
            <div id="counter" style="font-size:80px; color:#ff3131;">0</div>
            <div id="qrcode" style="display:flex; justify-content:center; margin:15px;"></div>
            <button class="btn-go" style="padding:15px 50px; font-size:24px; cursor:pointer;" onclick="showSlotMachine()">解鎖並啟動 (GO!)</button>
        </div>
        <div id="slot-view" class="hidden">
            <div class="slot-machine">
                <h2 class="machine-title">CREATIVE SLOT</h2>
                <div class="slots-viewport">
                    <div class="slot-column"><div id="s1" class="slot-item">？</div></div>
                    <div class="slot-column"><div id="s2" class="slot-item">？</div></div>
                    <div class="slot-column"><div id="s3" class="slot-item">？</div></div>
                </div>
            </div>
            <div class="handle-wrapper" id="handle" onmousedown="startSpinHandle()" onmouseup="stopSpinHandle()" ontouchstart="startSpinHandle()" ontouchend="stopSpinHandle()">
                <div class="handle-base"></div>
                <div class="handle-stick"><div class="handle-ball"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 讓機台永遠完美撐滿螢幕的法寶
    function initScale() {
        const container = document.getElementById('scaling-container');
        const scale = Math.min(window.innerWidth / 800, window.innerHeight / 600);
        container.style.transform = `scale(${scale})`;
    }
    
    /* 這裡請保留您原本所有的 JavaScript 邏輯 (GAS_URL, playTick, stopSpinHandle 等等) */
</script>
</body>
</html>
