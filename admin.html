<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創意思考老虎機</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #121212; --red: #8b0000; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; color: white; }
        .container { width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
        #wait-view { text-align: center; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 20px; border: 4px solid var(--gold); }
        #counter { font-size: 100px; font-weight: bold; color: #e74c3c; margin: 10px; }
        .btn-go { background: #2980b9; color: white; border: none; padding: 15px 50px; border-radius: 50px; font-size: 24px; cursor: pointer; }
        #slot-view { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .slot-machine { background: var(--red); width: 80vw; max-width: 800px; height: 70vh; border-radius: 30px; border: 10px solid #4a0000; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .slots-viewport { width: 100%; flex: 1; background: #fff; border-radius: 10px; border: 5px solid var(--gold); display: flex; overflow: hidden; position: relative; }
        .slot-column { width: 33.3%; display: flex; align-items: center; justify-content: center; border-right: 1px solid #ddd; }
        .slot-item { font-size: 3.5rem; font-weight: bold; color: #333; text-align: center; }
        .handle-wrapper { width: 60px; height: 50vh; margin-left: 20px; position: relative; cursor: pointer; }
        .handle-stick { position: absolute; bottom: 80px; left: 20px; width: 15px; height: 30vh; background: #ccc; transform-origin: bottom center; transition: 0.2s; }
        .handle-ball { position: absolute; top: -40px; left: -15px; width: 45px; height: 45px; background: red; border-radius: 50%; }
        .handle-wrapper.active .handle-stick { transform: rotateX(60deg); }
        .blur-animate { animation: scrollBlur 0.1s infinite linear; filter: blur(5px); }
        @keyframes scrollBlur { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
    </style>
</head>
<body>
<div class="container">
    <div id="wait-view">
        <h1>創意碎片期待值</h1>
        <div id="counter">0</div>
        <div id="qrcode" style="display:flex; justify-content:center; margin:15px;"></div>
        <button class="btn-go" onclick="showSlotMachine()">解鎖並啟動 (GO!)</button>
    </div>
    <div id="slot-view" class="hidden">
        <div class="slot-machine">
            <h2 style="font-size:2.5rem; margin:10px;">CREATIVE SLOT</h2>
            <div class="slots-viewport">
                <div class="slot-column"><div id="s1" class="slot-item">？</div></div>
                <div class="slot-column"><div id="s2" class="slot-item">？</div></div>
                <div class="slot-column"><div id="s3" class="slot-item">？</div></div>
            </div>
        </div>
        <div class="handle-wrapper" id="handle" onmousedown="startSpinHandle()" onmouseup="stopSpinHandle()" ontouchstart="startSpinHandle()" ontouchend="stopSpinHandle()">
            <div class="handle-stick"><div class="handle-ball"></div></div>
        </div>
    </div>
</div>
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFXIj9VPb2ABXVQttXykbx8yRbD856pptbqJ1iptBhGbThq7wbw68VHj8c7vJVb28/exec";
    let allData = { who: [], where: [], doing: [] }, usedIndices = { who: [], where: [], doing: [] };
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let spinInterval = null;

    function playClick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function showSlotMachine() {
        if (allData.who.length === 0) return alert("還沒有資料喔！");
        audioCtx.resume();
        document.getElementById('wait-view').classList.add('hidden');
        document.getElementById('slot-view').classList.remove('hidden');
    }

    function startSpinHandle() {
        document.getElementById('handle').classList.add('active');
        document.querySelectorAll('.slot-item').forEach(el => el.classList.add('blur-animate'));
        if (!spinInterval) spinInterval = setInterval(playClick, 100);
    }

    function stopSpinHandle() {
        document.getElementById('handle').classList.remove('active');
        document.querySelectorAll('.slot-item').forEach(el => el.classList.remove('blur-animate'));
        clearInterval(spinInterval); spinInterval = null;
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        if (allData.who.length > 0) {
            ['who','where','doing'].forEach((cat, i) => {
                if (!usedIndices[cat] || usedIndices[cat].length >= allData[cat].length) usedIndices[cat] = [];
                let avail = allData[cat].map((_, idx) => idx).filter(idx => !usedIndices[cat].includes(idx));
                let chosen = avail[Math.floor(Math.random() * avail.length)];
                usedIndices[cat].push(chosen);
                document.getElementById('s' + (i+1)).innerText = allData[cat][chosen];
            });
        }
    }

    new QRCode(document.getElementById("qrcode"), { text: window.location.href.replace('admin.html', 'index.html'), width: 150, height: 150 });
    setInterval(() => { fetch(GAS_URL + "?action=get").then(res => res.json()).then(data => { allData = data; document.getElementById('counter').innerText = data.who.length; }); }, 3000);
</script>
</body>
</html>
