<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創意思考：神祕重組老虎機 (音效強化版)</title>

    <style>
        :root {
            --gold: #ffd700;

            --machine-body: #8b0000;
            --neon-red: #ff3131;

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle, #2c3e50 0%, #121212 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        .container { width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .hidden { display: none !important; }

        /* --- 等待畫面 --- */
        #wait-view {
            text-align: center; background: rgba(0, 0, 0, 0.8); padding: 40px; border-radius: 20px;
            border: 4px solid var(--gold); box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        #counter { font-size: 120px; font-weight: bold; color: #e74c3c; margin: 20px 0; text-shadow: 0 0 20px #e74c3c; }

        .btn-go {
            background: #2980b9; color: white; border: none; padding: 20px 60px; border-radius: 50px;
            font-size: 28px; font-weight: bold; cursor: pointer; box-shadow: 0 5px #1c5478; transition: all 0.2s;
        }

        /* --- 老虎機畫面 --- */
        #slot-view { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .machine-wrapper { position: relative; display: flex; align-items: flex-end; }
        .slot-machine {
            background-color: var(--machine-body); width: 70vw; max-width: 900px; height: 80vh;
            border-radius: 30px; border: 15px solid #4a0000; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;
        }

        .machine-header { font-size: 3rem; font-weight: bold; text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-red); margin-bottom: 20px; }
        .slots-viewport {
            width: 100%; flex: 1; background: #fff; border-radius: 15px; border: 10px solid var(--gold);
            display: flex; justify-content: space-around; overflow: hidden; position: relative;
        }
        .slots-viewport::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 4px; background: rgba(255, 49, 49, 0.7); z-index: 10; }

        .slot-column { width: 32%; height: 100%; border-right: 2px solid #ccc; display: flex; align-items: center; justify-content: center; }
        .slot-column:last-child { border-right: none; }
        .slot-item { font-size: 4rem; font-weight: bold; color: #333; text-align: center; }

        /* --- 拉桿 --- */
