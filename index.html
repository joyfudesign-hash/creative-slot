<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創意思考：神祕重組遊戲</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #2c3e50; --card: #ecf0f1; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width: 90%; max-width: 900px; text-align: center; position: relative; }
        
        /* 隱藏邏輯 */
        .hidden { display: none !important; }

        /* 學生端頁面 */
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #bdc3c7; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        .btn-submit { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 20px; cursor: pointer; }

        /* 老師端：等待畫面 */
        #admin-wait-view h1 { color: #2c3e50; }
        #counter { font-size: 60px; font-weight: bold; color: #e74c3c; margin: 20px 0; }
        .btn-go { background: #2980b9; color: white; border: none; padding: 20px 50px; border-radius: 50px; font-size: 24px; cursor: pointer; animation: pulse 2s infinite; }

        /* 老師端：老虎機畫面 */
        .slots { display: flex; justify-content: space-around; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 10px solid var(--gold); margin: 30px 0; height: 150px; overflow: hidden; }
        .slot-column { width: 30%; background: white; height: 100%; border-radius: 5px; position: relative; overflow: hidden; }
        .slot-list { position: absolute; width: 100%; top: 0; left: 0; }
        .slot-item { height: 150px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; text-align: center; padding: 0 10px; box-sizing: border-box; }
        
        /* 模糊動畫 */
        .blur-animate { animation: scrollBlur 0.1s infinite linear; filter: blur(4px); }
        @keyframes scrollBlur {
            0% { transform: translateY(0); }
            100% { transform: translateY(-150px); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-play { background: #f1c40f; color: #2c3e50; border: none; padding: 20px; border-radius: 10px; width: 100%; font-size: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 5px #d4ac0d; }
        .btn-play:active { transform: translateY(4px); box-shadow: 0 1px #d4ac0d; }

        .reset-btn { position: absolute; bottom: 10px; right: 10px; font-size: 12px; background: none; border: 1px solid #ccc; color: #999; cursor: pointer; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 學生輸入頁面 (預設) -->
    <div id="student-view">
        <h1>創意思考挑戰</h1>
        <p>請根據指令輸入詞彙，保持神祕...</p>
        <input type="text" id="input-who" placeholder="某人 (主詞)">
        <input type="text" id="input-where" placeholder="在哪裡 (地點)">
        <input type="text" id="input-doing" placeholder="做某事 (動詞)">
        <button class="btn-submit" id="submit-btn" onclick="submitData()">確認上傳</button>
        <p id="status-msg"></p>
    </div>

    <!-- 2. 老師等待頁面 -->
    <div id="admin-wait-view" class="hidden">
        <h1>期待值：目前已收集</h1>
        <div id="counter">0</div>
        <p>位同學的創意碎片</p>
        <div id="qrcode" style="display: flex; justify-content: center; margin: 20px;"></div>
        <button class="btn-go" onclick="goToSlot()">準備揭曉 (GO!)</button>
    </div>

    <!-- 3. 老虎機頁面 -->
    <div id="slot-view" class="hidden">
        <h1>創意組合誕生</h1>
        <div class="slots">
            <div class="slot-column"><div id="s1" class="slot-list"><div class="slot-item">？</div></div></div>
            <div class="slot-column"><div id="s2" class="slot-list"><div class="slot-item">？</div></div></div>
            <div class="slot-column"><div id="s3" class="slot-list"><div class="slot-item">？</div></div></div>
        </div>
        <button class="btn-play" id="play-btn" onmousedown="startSpin()" onmouseup="stopSpin()" ontouchstart="startSpin()" ontouchend="stopSpin()">按住啟動拉桿</button>
        <button class="reset-btn" onclick="location.reload()">重置遊戲</button>
    </div>
</div>

<!-- 音效資源 (使用網路開源短音效) -->
<audio id="snd-spin" loop src="https://www.soundjay.com/buttons/button-20.mp3"></audio>
<audio id="snd-stop" src="https://www.soundjay.com/buttons/button-3.mp3"></audio>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwb4l-YD-3eHRwpirMNljvmbGuUVsb7KVfTAQqLdCxrhZrQVIibiL9QAsMhWOo_8N6ovA/exec"; // 請替換成你的 URL
    let allData = { who: [], where: [], doing: [] };
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('mode') === 'admin';

    // 初始化介面判斷
    if (isAdmin) {
        document.getElementById('student-view').classList.add('hidden');
        document.getElementById('admin-wait-view').classList.remove('hidden');
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href.split('?')[0], // QR Code 指向不帶參數的學生版
            width: 180, height: 180
        });
        setInterval(fetchData, 4000);
    }

    function fetchData() {
        fetch(`${GAS_URL}?action=get`).then(res => res.json()).then(data => {
            allData = data;
            document.getElementById('counter').innerText = data.who.length;
        });
    }

    function submitData() {
        const who = document.getElementById('input-who').value;
        const where = document.getElementById('input-where').value;
        const doing = document.getElementById('input-doing').value;
        if (!who || !where || !doing) return alert("還沒填完喔！");
        if (localStorage.getItem('submitted')) return alert("你已經完成任務了！");

        document.getElementById('submit-btn').disabled = true;
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ who, where, doing }) })
        .then(() => {
            localStorage.setItem('submitted', 'true');
            document.getElementById('status-msg').innerText = "上傳成功！請等待老師揭曉。";
        });
    }

    function goToSlot() {
        if (allData.who.length < 1) return alert("還沒有人投稿喔！");
        document.getElementById('admin-wait-view').classList.add('hidden');
        document.getElementById('slot-view').classList.remove('hidden');
    }

    // 老虎機動畫邏輯
    function startSpin() {
        document.getElementById('s1').classList.add('blur-animate');
        document.getElementById('s2').classList.add('blur-animate');
        document.getElementById('s3').classList.add('blur-animate');
        document.getElementById('snd-spin').play();
    }

    function stopSpin() {
        document.getElementById('s1').classList.remove('blur-animate');
        document.getElementById('s2').classList.remove('blur-animate');
        document.getElementById('s3').classList.remove('blur-animate');
        document.getElementById('snd-spin').pause();
        document.getElementById('snd-stop').play();

        // 隨機選取結果
        document.getElementById('s1').innerHTML = `<div class="slot-item">${allData.who[Math.floor(Math.random()*allData.who.length)]}</div>`;
        document.getElementById('s2').innerHTML = `<div class="slot-item">${allData.where[Math.floor(Math.random()*allData.where.length)]}</div>`;
        document.getElementById('s3').innerHTML = `<div class="slot-item">${allData.doing[Math.floor(Math.random()*allData.doing.length)]}</div>`;
    }
</script>
</body>
</html>
