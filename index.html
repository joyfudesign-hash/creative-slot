<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填寫詞彙</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #2c3e50; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #ecf0f1; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h2 { color: #2c3e50; font-size: 22px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #bdc3c7; border-radius: 10px; font-size: 18px; box-sizing: border-box; transition: border 0.3s; }
        input:focus { border-color: #27ae60; outline: none; }
        .btn-submit { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-submit:disabled { background: #bdc3c7; cursor: not-allowed; }
        #status-msg { margin-top: 15px; font-weight: bold; color: #27ae60; min-height: 24px; font-size: 14px; }
        .char-hint { font-size: 11px; color: #95a5a6; text-align: right; display: block; margin-top: -5px; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2>請輸入詞彙</h2>
    
    <input type="text" id="input-who" placeholder="某人 / 某物" maxlength="8">
    <span class="char-hint">限 8 字</span>
    
    <input type="text" id="input-where" placeholder="在哪裡 / 什麼情境" maxlength="8">
    <span class="char-hint">限 8 字</span>
    
    <input type="text" id="input-doing" placeholder="做什麼 / 怎麼了" maxlength="8">
    <span class="char-hint">限 8 字</span>
    
    <button class="btn-submit" id="submit-btn" onclick="submitData()">確認上傳</button>
    <p id="status-msg"></p>
</div>

<script>
    // ⚠️ 老師！我已經幫您換成您剛才給我的最新 GAS URL 了
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFXIj9VPb2ABXVQttXykbx8yRbD856pptbqJ1iptBhGbThq7wbw68VHj8c7vJVb28/exec";

    function submitData() {
        const who = document.getElementById('input-who').value.trim();
        const where = document.getElementById('input-where').value.trim();
        const doing = document.getElementById('input-doing').value.trim();
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('status-msg');

        if (!who || !where || !doing) {
            alert("三個格子都要填寫喔！");
            return;
        }
        
        btn.disabled = true;
        btn.innerText = "傳送中...";
        msg.innerText = "正在送往老師的螢幕...";

        // 使用 POST 方式傳送
        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ who: who, where: where, doing: doing })
        })
        .then(() => {
            btn.innerText = "傳送成功！";
            btn.style.background = "#bdc3c7";
            msg.innerText = "🎉 已成功送達！";
            
            setTimeout(() => {
                document.getElementById('input-who').value = "";
                document.getElementById('input-where').value = "";
                document.getElementById('input-doing').value = "";
                btn.disabled = false;
                btn.innerText = "確認上傳";
                btn.style.background = "#27ae60";
                msg.innerText = "";
            }, 2500);
        })
        .catch((err) => {
            console.error(err);
            alert("連線失敗，請檢查網路。");
            btn.disabled = false;
            btn.innerText = "確認上傳";
            msg.innerText = "";
        });
    }
</script>
</body>
</html>
