<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生端：詞彙投稿</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #2c3e50; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #ecf0f1; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #bdc3c7; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        .btn-submit { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 20px; cursor: pointer; }
        #status-msg { margin-top: 15px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>
<div class="container">
    <h1>創意思考挑戰</h1>
    <p>請輸入詞彙，保持神祕...</p>
    <input type="text" id="input-who" placeholder="某人 (主詞)">
    <input type="text" id="input-where" placeholder="在哪裡 (地點)">
    <input type="text" id="input-doing" placeholder="做某事 (動詞)">
    <button class="btn-submit" id="submit-btn" onclick="submitData()">確認上傳</button>
    <p id="status-msg"></p>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwt7XFZfoNBNMbkzPEY67rJEoAtHUmuvFJTD0xh7oe8HYCyl_grxAIxPDq_UX9c-Mo4Uw/exec";

    function submitData() {
        const who = document.getElementById('input-who').value;
        const where = document.getElementById('input-where').value;
        const doing = document.getElementById('input-doing').value;
        const btn = document.getElementById('submit-btn');

        if (!who || !where || !doing) return alert("還沒填完喔！");
        if (localStorage.getItem('submitted')) return alert("你已經完成任務了！");

        btn.disabled = true;
        btn.innerText = "傳送中...";

        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ who: who, where: where, doing: doing })
        })
        .then(() => {
            localStorage.setItem('submitted', 'true');
            btn.innerText = "上傳成功！";
            btn.style.background = "#bdc3c7";
            document.getElementById('status-msg').innerText = "上傳成功！請等待老師揭曉。";
        })
        .catch(() => {
            alert("連線異常，請檢查網路。");
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
